<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />

        <title>Plan Marathon</title>

        <link rel="manifest" href="manifest.json" />
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <h2>Plan Marathon</h2>

        <button onclick="showTab('tableTab')">TABLEAU</button>
        <button onclick="showTab('course')">MODE COURSE</button>
        <button onclick="showTab('observateur')">OBSERVATEUR</button>
        <button onclick="showTab('strava')">STRAVA</button>
        <button onclick="showTab('urltab')">URL</button>

        <!-- TABLEAU -->

        <div id="tableTab" class="tab active">
            Départ :
            <input type="time" id="startTime" />
            <button id="startNow">Start</button>

            <br /><br />

            <button id="pace615">PACE 6:15</button>
            <button id="pace630">PACE 6:30</button>

            <table id="table">
                <thead>
                    <tr>
                        <th>KM</th>
                        <th>Temps</th>
                        <th>Cumul</th>
                        <th>Heure</th>
                        <th>Délai</th>
                        <th>Ravitaillement</th>
                        <th>Note</th>
                    </tr>
                </thead>

                <tbody></tbody>
            </table>
        </div>

        <!-- MODE COURSE -->

        <div id="course" class="tab">
            <div id="courseTime"></div>

            <div id="courseKm"></div>

            <div id="ravitoList"></div>
        </div>

        <!-- OBSERVATEUR -->

        <div id="observateur" class="tab">
            <div
                id="obsNextBlock"
                style="
                    font-size: 28px;
                    margin: 10px 0;
                    padding: 10px;
                    border: 1px solid #ccc;
                "
            >
                <div><span id="obsNextKm">-</span></div>
                <div>Quand: <span id="obsNextTime">--:--:--</span></div>
                <div>Dans: <span id="obsNextCountdown">--:--</span></div>
            </div>

            <table id="obsTable">
                <thead>
                    <tr>
                        <th>KM</th>
                        <th>Lieu</th>
                        <th>Temps G</th>
                        <th>Délai L</th>
                        <th>Ligne</th>
                        <th>Station</th>
                        <th>Commentaire</th>
                    </tr>
                </thead>

                <tbody></tbody>
            </table>
        </div>

        <!-- STRAVA -->

        <div id="strava" class="tab">
            <div
                class="strava-embed-placeholder"
                data-embed-type="route"
                data-embed-id="3314660708901242298"
                data-style="standard"
            ></div>

            <script src="https://strava-embeds.com/embed.js"></script>
        </div>

        <!-- URL -->

        <div id="urltab" class="tab">
            <input type="text" id="customUrl" placeholder="https://" />

            <button onclick="loadUrl()">Afficher</button>
            <button onclick="resetUrl()">Reset</button>

            <iframe id="urlFrame"></iframe>
        </div>

        <script src="script.js"></script>
    </body>
</html>
